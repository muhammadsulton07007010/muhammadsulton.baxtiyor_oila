        --text: #334155;
      }

        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.6;
        padding: 20px;
      }

      .container {
        max-width: 850px;
        margin: 0 auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1),
          0 2px 4px -2px rgb(0 0 0 / 0.1);
      }

      header {
        text-align: center;
        margin-bottom: 30px;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 20px;
      }

      h1 {
        color: var(--primary);
        font-size: 24px;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #64748b;
        font-size: 14px;
      }

      .setup-screen {
        text-align: center;
        padding: 20px 0;
      }

      .setup-screen p {
        margin-bottom: 20px;
        font-size: 16px;
      }

      .options-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 30px;
      }

      .mode-btn {
        padding: 12px;
        font-size: 15px;
        font-weight: bold;
        background: #fff;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .mode-btn:hover {
        border-color: var(--accent);
        background: #f0f7ff;
      }

      .mode-btn.selected {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .quiz-progress {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-weight: 600;
      }

      .progress-bar-container {
        width: 100%;
        background-color: #e2e8f0;
        height: 8px;
        border-radius: 4px;
        margin-bottom: 25px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background-color: var(--accent);
        width: 0%;
        transition: width 0.3s ease;
      }

      .question-card h2 {
        font-size: 18px;
        color: var(--primary);
        margin-bottom: 20px;
      }

      .options-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option-btn {
        width: 100%;
        padding: 14px 20px;
        text-align: left;
        background: #ffffff;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        transition: all 0.2s ease;
      }

      .option-btn:hover:not(:disabled) {
        border-color: var(--accent);
        background-color: #f0f7ff;
      }

      .option-btn.correct {
        background-color: #ecfdf5;
        border-color: var(--success);
        color: #065f46;
        font-weight: 600;
      }

      .option-btn.wrong {
        background-color: #fef2f2;
        border-color: var(--danger);
        color: #991b1b;
      }

      .footer-controls {
        margin-top: 30px;
        display: flex;
        justify-content: flex-end;
      }

      .btn {
        padding: 12px 30px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 15px;
        transition: background 0.2s;
      }

      .btn-primary {
        background-color: var(--accent);
        color: white;
      }

      .btn-primary:hover {
        background-color: #2563eb;
      }

      .btn-primary:disabled {
        background-color: #94a3b8;
        cursor: not-allowed;
      }

      #result-screen {
        text-align: center;
        padding: 20px 0;
      }

      .score-circle {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: #f1f5f9;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 20px auto;
        border: 4px solid var(--accent);
      }

      .score-num {
        font-size: 36px;
        font-weight: bold;
        color: var(--primary);
      }

      .hidden {
        display: none;
      }

  </head>

      // Ikkala massivni birlashtirish -> jami 141 ta noyob test
      allQuestions.push(...remainingQuestions);

      let selectedQuestions = [];
      let currentQuestionIndex = 0;
      let score = 0;
      let hasAnswered = false;
      let quizCount = 25; // Default miqdor

      function selectCount(count, element) {
        quizCount = count;
        document
          .querySelectorAll(".mode-btn")
          .forEach((btn) => btn.classList.remove("selected"));
        element.classList.add("selected");
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function startQuiz() {
        const shuffled = shuffleArray([...allQuestions]);
        selectedQuestions = shuffled.slice(
          0,
          Math.min(quizCount, shuffled.length),
        );

        currentQuestionIndex = 0;
        score = 0;
        document.getElementById("score-counter").textContent =
          `To'g'ri javoblar: 0`;

        document.getElementById("setup-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");

        loadQuestion();
      }

      function loadQuestion() {
        hasAnswered = false;
        const nextBtn = document.getElementById("next-btn");
        nextBtn.disabled = true;

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        const currentQuestion = selectedQuestions[currentQuestionIndex];

        document.getElementById("question-text").textContent =
          `${currentQuestionIndex + 1}. ${currentQuestion.question}`;
        document.getElementById("question-number").textContent =
          `Savol: ${currentQuestionIndex + 1}/${selectedQuestions.length}`;

        const progressPercentage =
          (currentQuestionIndex / selectedQuestions.length) * 100;
        document.getElementById("progress-bar").style.width =
          `${progressPercentage}%`;

        // Variantlar tartibini tasodifiy aralashtirish
        const optionsMapping = currentQuestion.options.map((opt, index) => ({
          text: opt,
          originalIndex: index,
        }));
        shuffleArray(optionsMapping);

        optionsMapping.forEach((item) => {
          const button = document.createElement("button");
          button.classList.add("option-btn");
          button.textContent = item.text;
          button.addEventListener("click", () =>
            selectOption(item.originalIndex, currentQuestion.correct, button),
          );
          optionsContainer.appendChild(button);
        });
      }

      function selectOption(originalIndex, correctIndex, selectedButton) {
        if (hasAnswered) return;
        hasAnswered = true;

        const optionsContainer = document.getElementById("options-container");
        const allButtons = optionsContainer.querySelectorAll(".option-btn");

        allButtons.forEach((btn) => {
          btn.disabled = true;
        });

        if (originalIndex === correctIndex) {
          selectedButton.classList.add("correct");
          score++;
          document.getElementById("score-counter").textContent =
            `To'g'ri javoblar: ${score}`;
        } else {
          selectedButton.classList.add("wrong");
          const correctText =
            selectedQuestions[currentQuestionIndex].options[correctIndex];
          allButtons.forEach((btn) => {
            if (btn.textContent === correctText) btn.classList.add("correct");
          });
        }

        document.getElementById("next-btn").disabled = false;
      }

      document.getElementById("next-btn").addEventListener("click", () => {
        currentQuestionIndex++;
        if (currentQuestionIndex < selectedQuestions.length) {
          loadQuestion();
        } else {
          showResults();
        }
      });

      function showResults() {
        document.getElementById("progress-bar").style.width = "100%";
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.remove("hidden");

        document.getElementById("final-score").textContent =
          `${score}/${selectedQuestions.length}`;

        const percent = (score / selectedQuestions.length) * 100;
        const resultMessage = document.getElementById("result-message");
        if (percent >= 85) {
          resultMessage.textContent =
            "A'lo natija! Kiberxavfsizlik fanidan yakuniy nazoratga tayyorgarligingiz mukammal! 🚀";
          resultMessage.style.color = "var(--success)";
        } else if (percent >= 60) {
          resultMessage.textContent =
            "Yaxshi natija! Bilimlaringizni yanada mustahkamlash uchun xatolar ustida ishlang. 👍";
          resultMessage.style.color = "var(--accent)";
        } else {
          resultMessage.textContent =
            "Afsuski, natija past. Yakuniy imtihongacha barcha savollarni qayta ko'rib chiqishingiz tavsiya etiladi.";
          resultMessage.style.color = "var(--danger)";
        }
      }

      function restartQuiz() {
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("setup-screen").classList.remove("hidden");
      }
